[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["build", "install", "log"]

[tool.ruff.lint]
# slam_mapping uses the stricter ruleset (no legacy code yet).
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]
ignore = [
    "E501",  # line too long (handled by formatter)
    "N999",  # invalid module name (ROS2 packages allow snake_case)
]

[tool.ruff.lint.per-file-ignores]
"**/launch/*.launch.py" = ["E402"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
